<script>
  // =====================================================================
  // VARIABLES GLOBALES DE LA APLICACIÓN
  // =====================================================================
  var datos = [];
  var arbolPlantillas = null;
  var rutaActual = [];
  var usuarioActivoNombre = "";
  var usuarioActivoEmail = "";
  var usuarioEsAdmin = false; 
  var usuarioPermisos = {}; 
  var intentosMisArchivos = 0;
  var intentosDocumentos = 0;
  var intentosPlantillas = 0;
  var MAX_INTENTOS = 3;
  var docActivoParaGenerar = null;

  window.addEventListener('load', function() {
    // 1. Asegurar un arranque limpio y ocultar capas residuales
    ir('inicio'); 
    
    // 2. Ocultar componentes flotantes al inicio
    var btnAsistente = document.getElementById('btn-asistente');
    if (btnAsistente) btnAsistente.style.display = 'none';
    var ventanaChat = document.getElementById('ventana-chat');
    if (ventanaChat) ventanaChat.style.display = 'none';

    // 3. Cargar servicios del servidor de forma asíncrona
    google.script.run.obtenerDisciplinas(); 
    cargarUsuariosLogin(); 
  });

  function cargarUsuariosLogin() {
    google.script.run.withSuccessHandler(function(usuarios) {
      var select = document.getElementById('login-email');
      if (!select) return;
      select.innerHTML = '<option value="">Seleccione su usuario...</option>';
      usuarios.forEach(function(u) {
        select.innerHTML += '<option value="' + u.email + '">' + u.nombre + '</option>';
      });
    }).obtenerListaUsuarios();
  }

  function iniciarSesion() {
    var email = document.getElementById('login-email').value;
    var pass = document.getElementById('login-pass').value;
    var btn = document.getElementById('btn-login');
    
    var cartelError = document.getElementById('cartel-error-login');
    var textoError = document.getElementById('texto-error-login');
    
    if(cartelError) cartelError.style.display = 'none';
    
    if(!email || !pass) { 
      if(cartelError && textoError) {
        textoError.innerText = "Por favor, complete ambos campos.";
        cartelError.style.display = 'flex';
      } else {
        alert("Complete ambos campos.");
      }
      return; 
    }
    
    btn.disabled = true; 
    btn.innerHTML = '<span class="material-symbols-outlined" style="font-size: 16px; vertical-align: middle; animation: spin 2s linear infinite;">sync</span> VERIFICANDO...';
    
    google.script.run
      .withSuccessHandler(function(res) {
        btn.disabled = false; 
        btn.innerHTML = "INGRESAR AL PORTAL";
        if(res.success) {
          usuarioActivoNombre = res.nombreCompleto;
          usuarioActivoEmail = res.email;
          usuarioEsAdmin = res.permisos.admin; 
          usuarioPermisos = res.permisos;
          
          document.getElementById('saludo-usuario').innerText = "Hola, " + res.nombreCompleto;
          
          var cardAdmin = document.getElementById('card-administrador');
          if(cardAdmin) cardAdmin.style.display = usuarioPermisos.admin ? '' : 'none';

          var cardProy = document.querySelector('div[onclick="ir(\'proyectos\')"]');
          if(cardProy) cardProy.style.display = usuarioPermisos.proyectos ? '' : 'none';

          var cardUnid = document.getElementById('card-unidades');
          if(cardUnid) cardUnid.style.display = usuarioPermisos.unidades ? '' : 'none';

          var cardGen = document.querySelector('div[onclick="ir(\'generador\')"]');
          if(cardGen) cardGen.style.display = usuarioPermisos.memorias ? '' : 'none';

          var cardDoc = document.querySelector('div[onclick="ir(\'documentos\')"]');
          if(cardDoc) cardDoc.style.display = usuarioPermisos.documentos ? '' : 'none';

          var cardPla = document.querySelector('div[onclick="ir(\'plantillas\')"]');
          if(cardPla) cardPla.style.display = usuarioPermisos.plantillas ? '' : 'none';

          var btnAsistente = document.getElementById('btn-asistente');
          if (btnAsistente) btnAsistente.style.display = 'flex';
          
          ir('portal');
        } else { 
          if(cartelError && textoError) {
            textoError.innerText = res.error;
            cartelError.style.display = 'flex';
          } else {
            alert(res.error); 
          }
        }
      })
      .validarCredenciales(email, pass);
  }

  // --- FUNCIÓN HELPER: Mensajes internos para Registro ---
  function mostrarMensajeRegistro(mensaje, esExito) {
    var container = document.querySelector('#pantalla-registro .caja-inicio');
    var msgDiv = document.getElementById('msg-registro-alerta');
    
    if (!msgDiv) {
      msgDiv = document.createElement('div');
      msgDiv.id = 'msg-registro-alerta';
      msgDiv.style.padding = '12px';
      msgDiv.style.borderRadius = '4px';
      msgDiv.style.fontSize = '13px';
      msgDiv.style.marginBottom = '15px';
      msgDiv.style.display = 'flex';
      msgDiv.style.alignItems = 'center';
      msgDiv.style.gap = '8px';
      msgDiv.style.fontWeight = '500';
      msgDiv.style.textAlign = 'left';
      msgDiv.style.lineHeight = '1.4';
      
      var btnRegistro = document.getElementById('btn-registro');
      container.insertBefore(msgDiv, btnRegistro);
    }
    
    if (esExito) {
      msgDiv.style.backgroundColor = '#e6f4ea';
      msgDiv.style.border = '1px solid #ceead6';
      msgDiv.style.color = '#137333';
      msgDiv.innerHTML = '<span class="material-symbols-outlined" style="font-size: 20px; flex-shrink: 0;">check_circle</span> <span>' + mensaje + '</span>';
    } else {
      msgDiv.style.backgroundColor = '#fce8e6';
      msgDiv.style.border = '1px solid #fad2cf';
      msgDiv.style.color = '#c5221f';
      msgDiv.innerHTML = '<span class="material-symbols-outlined" style="font-size: 20px; flex-shrink: 0;">error</span> <span>' + mensaje + '</span>';
    }
    msgDiv.style.display = 'flex';
  }

  function registrarUsuario() {
    var nombre = document.getElementById('reg-nombre').value;
    var apellido = document.getElementById('reg-apellido').value;
    var email = document.getElementById('reg-email').value;
    var pass = document.getElementById('reg-pass').value;
    var pass2 = document.getElementById('reg-pass2').value;
    var btn = document.getElementById('btn-registro');
    
    if(!nombre || !apellido || !email || !pass) { mostrarMensajeRegistro("Todos los campos son obligatorios.", false); return; }
    if(pass !== pass2) { mostrarMensajeRegistro("Las contraseñas no coinciden.", false); return; }
    
    var msgDiv = document.getElementById('msg-registro-alerta');
    if(msgDiv) msgDiv.style.display = 'none';

    btn.disabled = true; 
    btn.innerHTML = '<span class="material-symbols-outlined" style="font-size: 16px; vertical-align: middle; animation: spin 2s linear infinite;">sync</span> CREANDO CUENTA...';
    
    google.script.run
      .withSuccessHandler(function(res) {
        btn.disabled = false; 
        btn.innerHTML = "CREAR CUENTA";
        if(res.success) {
          mostrarMensajeRegistro("Cuenta creada con éxito. Redirigiendo...", true);
          document.getElementById('reg-nombre').value = '';
          document.getElementById('reg-apellido').value = '';
          document.getElementById('reg-pass').value = '';
          document.getElementById('reg-pass2').value = '';
          
          cargarUsuariosLogin();
          
          setTimeout(function() {
            var selectElement = document.getElementById('login-email');
            if(selectElement) selectElement.value = email; 
            ir('inicio');
            if(msgDiv) msgDiv.style.display = 'none';
          }, 2000);

        } else { 
          mostrarMensajeRegistro(res.error, false); 
        }
      })
      .registrarUsuarioNuevo(email, pass, nombre, apellido);
  }

  // --- FUNCIÓN HELPER: Mensajes internos para Perfil ---
  function mostrarMensajePerfil(mensaje, esExito) {
    var container = document.querySelector('#pantalla-perfil .caja-inicio');
    var msgDiv = document.getElementById('msg-perfil-alerta');
    
    if (!msgDiv) {
      msgDiv = document.createElement('div');
      msgDiv.id = 'msg-perfil-alerta';
      msgDiv.style.padding = '12px';
      msgDiv.style.borderRadius = '4px';
      msgDiv.style.fontSize = '13px';
      msgDiv.style.marginBottom = '15px';
      msgDiv.style.display = 'flex';
      msgDiv.style.alignItems = 'center';
      msgDiv.style.gap = '8px';
      msgDiv.style.fontWeight = '500';
      msgDiv.style.textAlign = 'left';
      msgDiv.style.lineHeight = '1.4';
      
      var btnGuardar = document.getElementById('btn-perf-guardar');
      container.insertBefore(msgDiv, btnGuardar);
    }
    
    if (esExito) {
      msgDiv.style.backgroundColor = '#e6f4ea';
      msgDiv.style.border = '1px solid #ceead6';
      msgDiv.style.color = '#137333';
      msgDiv.innerHTML = '<span class="material-symbols-outlined" style="font-size: 20px; flex-shrink: 0;">check_circle</span> <span>' + mensaje + '</span>';
    } else {
      msgDiv.style.backgroundColor = '#fce8e6';
      msgDiv.style.border = '1px solid #fad2cf';
      msgDiv.style.color = '#c5221f';
      msgDiv.innerHTML = '<span class="material-symbols-outlined" style="font-size: 20px; flex-shrink: 0;">error</span> <span>' + mensaje + '</span>';
    }
    msgDiv.style.display = 'flex';
  }

  function cargarPerfil() {
    // Si quedó un mensaje de antes, lo ocultamos al entrar
    var msgDiv = document.getElementById('msg-perfil-alerta');
    if(msgDiv) msgDiv.style.display = 'none';

    google.script.run.withSuccessHandler(function(res) {
        if(res.error) { mostrarMensajePerfil(res.error, false); return; }
        document.getElementById('perf-nombre').value = res.nombre;
        document.getElementById('perf-apellido').value = res.apellido;
        document.getElementById('perf-email').value = usuarioActivoEmail;
        document.getElementById('perf-pass').value = res.password;
        document.getElementById('perf-pass2').value = res.password;
      }).obtenerDatosPerfil(usuarioActivoEmail);
  }

  function guardarPerfil() {
    var nombre = document.getElementById('perf-nombre').value;
    var apellido = document.getElementById('perf-apellido').value;
    var pass = document.getElementById('perf-pass').value;
    var pass2 = document.getElementById('perf-pass2').value;
    
    if(!nombre || !apellido || !pass) { mostrarMensajePerfil("Todos los campos son obligatorios.", false); return; }
    if(pass !== pass2) { mostrarMensajePerfil("Las contraseñas no coinciden.", false); return; }
    
    var msgDiv = document.getElementById('msg-perfil-alerta');
    if(msgDiv) msgDiv.style.display = 'none';

    var btn = document.getElementById('btn-perf-guardar');
    btn.disabled = true; 
    btn.innerHTML = '<span class="material-symbols-outlined" style="font-size: 16px; vertical-align: middle; animation: spin 2s linear infinite;">sync</span> GUARDANDO CAMBIOS...';

    google.script.run.withSuccessHandler(function(res) {
        btn.disabled = false; 
        btn.innerHTML = "GUARDAR CAMBIOS";
        if(res.success) {
          mostrarMensajePerfil("Perfil actualizado correctamente.", true);
          usuarioActivoNombre = res.nuevoNombre;
          document.getElementById('saludo-usuario').innerText = "Hola, " + res.nuevoNombre;
          
          // Esperar 2 segundos para que el usuario pueda leer el cartel de éxito
          setTimeout(function() {
            ir('portal');
            if(msgDiv) msgDiv.style.display = 'none';
          }, 2000);
        } else { 
          mostrarMensajePerfil(res.error, false); 
        }
      }).actualizarPerfilUsuario(usuarioActivoEmail, nombre, apellido, pass);
  }

  // ==========================================================
  // CONTROL DE NAVEGACIÓN Y MENÚS GLOBALES
  // ==========================================================
  function ir(p) {
    document.querySelectorAll('div[id^="pantalla-"]').forEach(d => {
      d.style.display = 'none';
    });
    
    var pantalla = document.getElementById('pantalla-'+p);
    
    if(pantalla) {
        pantalla.style.display = 'flex'; 
    } else {
        console.error("Atención: La pantalla solicitada no existe.");
        if (!usuarioActivoEmail) { ir('inicio'); } else { ir('portal'); }
        return; 
    }
    
    if(p === 'perfil') cargarPerfil();
    if(p === 'plantillas' && !arbolPlantillas) recargarPlantillas();
    if(p === 'documentos') recargarDocumentos();
    if(p === 'mis-archivos') recargarMisArchivos();
    if(p === 'admin') cargarUsuariosAdmin();
    
    if(p === 'proyectos') {
      cargarDatosProyectos(); 
      if (typeof mostrarSubPantallaProyectos === 'function') {
        mostrarSubPantallaProyectos('menu');
      }
    }
    
    if(p === 'proyectos-eliminados') {
      if (typeof cargarListaEliminados === 'function') cargarListaEliminados();
    }

    if(p === 'unidades') {
      if (typeof arrancarUnidadesAsistenciales === 'function') arrancarUnidadesAsistenciales();
    }
    
    if(p === 'inicio') {
        var cartelError = document.getElementById('cartel-error-login');
        if(cartelError) cartelError.style.display = 'none';
    }
  }

  function cerrarSesion() { 
    document.getElementById('login-pass').value = ''; 
    usuarioActivoNombre = ""; 
    usuarioActivoEmail = "";
    usuarioEsAdmin = false;
    usuarioPermisos = {};
    
    var btnAsistente = document.getElementById('btn-asistente');
    if (btnAsistente) btnAsistente.style.display = 'none';
    var ventanaChat = document.getElementById('ventana-chat');
    if (ventanaChat) ventanaChat.style.display = 'none';
    
    var cajaActividad = document.getElementById('caja-resumen-actividad');
    if (cajaActividad) { cajaActividad.innerHTML = '(Módulo en construcción)'; }
    ir('inicio'); 
  }
  
  // ==========================================================
  // PANEL DE ADMINISTRADOR Y PERMISOS
  // ==========================================================
  function cargarUsuariosAdmin() {
    var loadingDiv = document.getElementById('loading-admin');
    var contenidoDiv = document.getElementById('contenido-admin');
    var tbody = document.getElementById('tabla-body-admin');
    
    if(loadingDiv) loadingDiv.style.display = 'block';
    if(contenidoDiv) contenidoDiv.style.display = 'none';

    google.script.run
      .withSuccessHandler(function(usuarios) {
        if(loadingDiv) loadingDiv.style.display = 'none';
        if(contenidoDiv) contenidoDiv.style.display = 'block';
        
        if(usuarios.error) { 
          if(tbody) tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; color:red; padding: 20px;">Error: ' + usuarios.error + '</td></tr>'; 
          return; 
        }
        renderizarTablaAdmin(usuarios);
      })
      .obtenerListaUsuariosAdmin();
  }

  function renderizarTablaAdmin(usuarios) {
    var tbody = document.getElementById('tabla-body-admin');
    tbody.innerHTML = '';
    if(usuarios.length === 0) { tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;">No hay usuarios registrados.</td></tr>'; return; }

    usuarios.forEach(function(u) {
      var tr = document.createElement('tr');
      var tdInfo = document.createElement('td');
      tdInfo.innerHTML = '<strong style="color: #333;">' + u.nombre + '</strong><br><span style="font-size:11px; color:#888;">' + u.email + '</span>';
      tr.appendChild(tdInfo);

      tr.appendChild(crearCeldaToggle(u.email, 'memorias', u.memorias));
      tr.appendChild(crearCeldaToggle(u.email, 'documentos', u.documentos));
      tr.appendChild(crearCeldaToggle(u.email, 'plantillas', u.plantillas));
      tr.appendChild(crearCeldaToggle(u.email, 'proyectos', u.proyectos));
      tr.appendChild(crearCeldaToggle(u.email, 'unidades', u.unidades));

      var tdAdmin = crearCeldaToggle(u.email, 'admin', u.admin);
      if(u.esSuperAdmin) {
        tdAdmin.innerHTML = '<span style="font-size:11px; color:#188038; font-weight:bold;"><span class="material-symbols-outlined" style="font-size: 14px; vertical-align: middle;">verified_user</span> SUPER ADMIN</span>';
      }
      tr.appendChild(tdAdmin);
      tbody.appendChild(tr);
    });
  }

  function crearCeldaToggle(email, modulo, estado) {
    var td = document.createElement('td');
    td.style.textAlign = 'center';
    var idCheck = 'chk_' + modulo + '_' + email.replace(/[@.]/g, ''); 
    td.innerHTML = `<label class="switch"><input type="checkbox" id="${idCheck}" ${estado ? 'checked' : ''} onchange="cambiarPermiso(this, '${email}', '${modulo}')"><span class="slider round"></span></label>`;
    return td;
  }

  function cambiarPermiso(checkbox, email, modulo) {
    checkbox.disabled = true;
    var estadoNuevo = checkbox.checked;
    google.script.run.withSuccessHandler(function(res) {
        checkbox.disabled = false;
        if(!res.success) { alert("Error al guardar el permiso: " + res.error); checkbox.checked = !estadoNuevo; }
      }).cambiarPermisoUsuario(email, modulo, estadoNuevo);
  }

  function cargarResumenActividad(nombreUsuario) {
    var cajaActividad = document.getElementById('caja-resumen-actividad');
    if (!cajaActividad) return;
    google.script.run.withSuccessHandler(function(respuesta) { cajaActividad.innerHTML = respuesta.html; })
      .withFailureHandler(function(error) { cajaActividad.innerHTML = '<span style="color:#d32f2f;">Error.</span>'; })
      .obtenerResumenActividad(nombreUsuario);
  }
</script>
