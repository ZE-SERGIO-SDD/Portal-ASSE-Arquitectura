<div id="pantalla-unidades" style="display: none; width: 100%; flex-direction: column; align-items: center; justify-content: flex-start; box-sizing: border-box; padding-top: 20px;">
  
  <div class="container" id="contenedor-dinamico-unidades" style="position: relative; max-width: 800px; width: 100%; min-height: 300px; padding: 40px; box-sizing: border-box; text-align: center;">
    
    <div style="padding: 50px; text-align: center;">
      <span class="material-symbols-outlined" style="animation: spin 2s linear infinite; font-size: 50px; color: #1c4587;">sync</span>
      <h3 style="color: #666; margin-top: 20px; font-family: 'Inter', sans-serif;">Cargando panel externo...</h3>
    </div>

  </div>
</div>

<script>
  function arrancarUnidadesAsistenciales() {
    var contenedor = document.getElementById('contenedor-dinamico-unidades');
    
    contenedor.innerHTML = `
      <div style="padding: 50px; text-align: center;">
        <span class="material-symbols-outlined" style="animation: spin 2s linear infinite; font-size: 50px; color: #1c4587;">sync</span>
        <h3 style="color: #666; margin-top: 20px; font-family: 'Inter', sans-serif;">Conectando con el servidor externo...</h3>
      </div>
    `;
    
    google.script.run
      .withSuccessHandler(function(html) {
         contenedor.innerHTML = html;
      })
      .withFailureHandler(function(err) {
         contenedor.innerHTML = `
           <div style="color: #d32f2f; padding: 30px; text-align: center;">
             <span class="material-symbols-outlined" style="font-size: 40px; margin-bottom: 10px;">error</span>
             <h2 style="margin-top: 0;">Error de comunicación</h2>
             <p>${err}</p>
             <button class="btn-volver" onclick="ir('portal')" style="margin-top:20px; display: inline-flex; align-items: center; justify-content: center; gap: 5px;">
               <span class="material-symbols-outlined" style="font-size: 18px;">arrow_back</span> VOLVER AL PORTAL
             </button>
           </div>
         `;
      })
      .obtenerVistaUnidades();
  }
</script>
