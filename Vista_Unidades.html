<div id="pantalla-unidades" style="display: none; width: 100%; min-height: 100vh; background-color: #f4f7f6; flex-direction: column; align-items: center; justify-content: flex-start; box-sizing: border-box; padding-top: 40px;">
  <div class="caja-inicio" id="contenedor-dinamico-unidades" style="max-width: 700px; width: 100%; position: relative; min-height: 300px; background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: center;">
    
    <div style="padding: 50px; text-align: center;">
      <span class="material-symbols-outlined" style="animation: spin 2s linear infinite; font-size: 50px; color: #1c4587;">sync</span>
      <h3 style="color: #666; margin-top: 20px; font-family: sans-serif;">Cargando panel externo...</h3>
    </div>

  </div>
</div>

<script>
  function arrancarUnidadesAsistenciales() {
    var contenedor = document.getElementById('contenedor-dinamico-unidades');
    
    contenedor.innerHTML = '<div style="padding: 50px; text-align: center;">' +
                           '<span class="material-symbols-outlined" style="animation: spin 2s linear infinite; font-size: 50px; color: #1c4587;">sync</span>' +
                           '<h3 style="color: #666; margin-top: 20px; font-family: sans-serif;">Conectando con el servidor externo...</h3>' +
                           '</div>';
    
    google.script.run
      .withSuccessHandler(function(html) {
         contenedor.innerHTML = html;
      })
      .withFailureHandler(function(err) {
         contenedor.innerHTML = '<div style="color: red; padding: 30px;"><h2>Error de comunicación</h2><p>' + err + '</p><button class="btn-azul" onclick="ir(\'portal\')" style="margin-top:20px;">VOLVER AL PORTAL</button></div>';
      })
      .obtenerVistaUnidades();
  }
</script>
