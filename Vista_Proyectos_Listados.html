<div id="proy-seccion-listados" style="display: none;">
  <div class="caja-inicio" style="width: 100%; max-width: 100%; padding: 30px; text-align: left;">
     <div style="background: #f0f4f8; padding: 15px; border-radius: 6px; border: 1px solid #d1d9e0; margin-bottom: 25px;">
       <div style="font-weight: 700; color: #1c4587; margin-bottom: 10px; font-size: 14px; display: flex; align-items: center; gap: 6px;">
         <span class="material-symbols-outlined" style="font-size: 18px;">filter_alt</span> Filtros de búsqueda:
       </div>
       <div style="display: flex; gap: 15px; flex-wrap: wrap;">
         <div style="flex: 1; min-width: 160px;">
           <label style="font-size: 11px; color: #666; font-weight: bold; display: block; margin-bottom: 4px;">FILTRO 1: PARTICIPANTE</label>
           <select id="filtro-participante" onchange="aplicarFiltrosListado()" style="width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #ccc; font-size: 13px;"><option value="">Todos</option></select>
         </div>
         <div style="flex: 1; min-width: 160px;">
           <label style="font-size: 11px; color: #666; font-weight: bold; display: block; margin-bottom: 4px;">FILTRO 2: DEPARTAMENTO</label>
           <select id="filtro-depto-listado" onchange="aplicarFiltrosListado()" style="width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #ccc; font-size: 13px;"><option value="">Todos</option></select>
         </div>
         <div style="flex: 1; min-width: 160px;">
           <label style="font-size: 11px; color: #666; font-weight: bold; display: block; margin-bottom: 4px;">FILTRO 3: TIPO DE OBRA</label>
           <select id="filtro-tipo-listado" onchange="actualizarEstadosFiltro()" style="width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #ccc; font-size: 13px;"><option value="">Todos</option></select>
         </div>
         <div style="flex: 1; min-width: 160px;">
           <label style="font-size: 11px; color: #666; font-weight: bold; display: block; margin-bottom: 4px;">FILTRO 4: ESTADO</label>
           <select id="filtro-estado-listado" onchange="aplicarFiltrosListado()" style="width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #ccc; font-size: 13px;"><option value="">Todos</option></select>
         </div>
       </div>
     </div>
     <div id="contenedor-lista-proyectos" style="display: flex; flex-direction: column; gap: 15px;">
        <p style="text-align:center; padding:20px; display: flex; justify-content: center; align-items: center; gap: 10px; color: #666;">
          <span class="material-symbols-outlined" style="animation: spin 2s linear infinite;">hourglass_empty</span> Cargando información...
        </p>
     </div>
  </div>
</div>

<script>
  // --- LÓGICA DE LISTADOS Y FILTROS MÚLTIPLES ---
  function cargarListaDeProyectos(forzar = false) {
    document.getElementById('contenedor-lista-proyectos').innerHTML = '<p style="text-align:center; padding:20px; display: flex; justify-content: center; align-items: center; gap: 10px; color: #666;"><span class="material-symbols-outlined" style="animation: spin 2s linear infinite;">hourglass_empty</span> Cargando proyectos y actualizando filtros...</p>';
    
    google.script.run.withSuccessHandler(function(resParams) {
      if (!resParams.error) {
        opcionesConfig = resParams;
        var selPart = document.getElementById('filtro-participante');
        var selDepto = document.getElementById('filtro-depto-listado');
        var selTipo = document.getElementById('filtro-tipo-listado');
        var selEstado = document.getElementById('filtro-estado-listado');

        var valPart = selPart.value, valDepto = selDepto.value, valTipo = selTipo.value, valEstado = selEstado.value;

        selPart.innerHTML = '<option value="">Todos</option>';
        selDepto.innerHTML = '<option value="">Todos</option>';
        selTipo.innerHTML = '<option value="">Todos</option>';
        selEstado.innerHTML = '<option value="">Todos</option>';

        if (opcionesConfig.participantes) opcionesConfig.participantes.forEach(p => selPart.innerHTML += `<option value="${p}">${p}</option>`);
        if (opcionesConfig.departamentos) opcionesConfig.departamentos.forEach(d => selDepto.innerHTML += `<option value="${d}">${d}</option>`);
        if (opcionesConfig.tiposObra) opcionesConfig.tiposObra.forEach(t => selTipo.innerHTML += `<option value="${t}">${t}</option>`);
        if (opcionesConfig.estados) opcionesConfig.estados.forEach(e => selEstado.innerHTML += `<option value="${e}">${e}</option>`);

        selPart.value = valPart || ''; selDepto.value = valDepto || ''; selTipo.value = valTipo || ''; selEstado.value = valEstado || '';
      }

      google.script.run.withSuccessHandler(function(resProyectos) {
        if (resProyectos.error) {
          document.getElementById('contenedor-lista-proyectos').innerHTML = '<p style="color:red; text-align:center;">Error al cargar datos.</p>';
          mostrarAlertaProy("Error", resProyectos.error, "error");
          return;
        }
        todosLosProyectosCargados = resProyectos;
        aplicarFiltrosListado(); 
      }).obtenerListaDeProyectos(forzar);

    }).obtenerParametrosProyectos(forzar);
  }

  function actualizarEstadosFiltro() {
    var tipo = document.getElementById('filtro-tipo-listado').value;
    var selEstado = document.getElementById('filtro-estado-listado');
    var valEstado = selEstado.value; 
    
    selEstado.innerHTML = '<option value="">Todos</option>';
    var estadosAMostrar = (tipo && opcionesConfig.mapaTiposEstados[tipo]) ? opcionesConfig.mapaTiposEstados[tipo] : (opcionesConfig.estados || []);
    estadosAMostrar.forEach(e => selEstado.innerHTML += `<option value="${e}">${e}</option>`);
    selEstado.value = valEstado; 
    if(!selEstado.value) selEstado.value = ""; 
    
    aplicarFiltrosListado();
  }

  function aplicarFiltrosListado() {
    var fPart = document.getElementById('filtro-participante').value.trim();
    var fDepto = document.getElementById('filtro-depto-listado').value.trim();
    var fTipo = document.getElementById('filtro-tipo-listado').value.trim();
    var fEstado = document.getElementById('filtro-estado-listado').value.trim();

    var contenedor = document.getElementById('contenedor-lista-proyectos');
    contenedor.innerHTML = '';

    var proyectosFiltrados = todosLosProyectosCargados.filter(p => {
        var estadoTexto = p.estado ? p.estado.toString().toLowerCase().trim() : '';
        var esTerminado = estadoTexto.includes('terminad') || estadoTexto.includes('finaliz') || estadoTexto.includes('entregad');
        
        if (vistaListadoActual === 'curso' && esTerminado) return false;
        if (vistaListadoActual === 'terminado' && !esTerminado) return false;

        if (fPart) {
          var equipo = p.equipo || [];
          var participa = equipo.some(miembro => miembro.participante && miembro.participante.toString().trim() === fPart);
          if (!participa) return false;
        }

        var deptoTexto = p.departamento ? p.departamento.toString().trim() : '';
        if (fDepto && deptoTexto !== fDepto) return false;

        var tipoTexto = p.tipoObra ? p.tipoObra.toString().trim() : '';
        if (fTipo && tipoTexto !== fTipo) return false;

        var estadoRealTexto = p.estado ? p.estado.toString().trim() : '';
        if (fEstado && estadoRealTexto !== fEstado) return false;

        return true; 
    });

    if (proyectosFiltrados.length === 0) {
        contenedor.innerHTML = '<p style="text-align:center; padding:30px; border: 1px dashed #ccc; border-radius: 6px; color:#666;">No hay proyectos que coincidan con los filtros seleccionados.</p>';
        return;
    }

    proyectosFiltrados.forEach(p => {
        var equipoHtml = p.equipo.map(m => `<li style="margin-bottom: 4px;"><strong>${m.participante}</strong> - <span style="color:#666; font-size:12px;">${m.rol}</span></li>`).join('');
        var fechaTxt = p.fecha ? new Date(p.fecha).toLocaleDateString() : "";

        var tarjeta = `
          <div style="border: 1px solid #d1d9e0; border-radius: 6px; padding: 20px; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.03);">
            <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; border-bottom: 1px solid #eee; padding-bottom: 12px;">
              <div style="flex: 1; padding-right: 15px;">
                <div style="font-size: 11px; color: #888; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; display: flex; align-items: center; gap: 4px;">
                  <span class="material-symbols-outlined" style="font-size: 14px;">location_on</span> ${p.departamento} • ${p.centro}
                </div>
                <div style="font-size: 18px; color: #1c4587; font-weight: bold; line-height: 1.2;">${p.nombre}</div>
              </div>
              <div style="text-align: right; min-width: 120px;">
                <div style="border: 1px solid #1c4587; color: #1c4587; padding: 4px 10px; border-radius: 4px; font-size: 12px; font-weight: bold; display: inline-block;">${p.estado}</div>
                <div style="font-size: 12px; color: #555; margin-top: 6px; font-weight: 600;">${p.tipoObra}</div>
              </div>
            </div>
            <p style="font-size: 14px; color: #444; margin-bottom: 15px; line-height: 1.6; white-space: pre-wrap;">${p.descripcion}</p>
            <div style="background: #f8f9fa; padding: 12px 15px; border-radius: 4px; border: 1px solid #eee; font-size: 13px;">
              <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                <strong style="color: #1c4587; display: flex; align-items: center; gap: 4px;">
                  <span class="material-symbols-outlined" style="font-size: 16px;">group</span> Equipo Asignado:
                </strong>
                ${fechaTxt ? `<span style="font-size: 11px; color: #888;">Creado: ${fechaTxt}</span>` : ''}
              </div>
              <ul style="margin: 0; padding-left: 20px; color: #333;">${equipoHtml}</ul>
            </div>
          </div>
        `;
        contenedor.innerHTML += tarjeta;
    });
  }
</script>
